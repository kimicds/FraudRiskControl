{% extends "base.html" %}
{% block content %}

<div class="page-card">
<h2 class="section-title">Transaction Assessment</h2>

<form method="POST">

<div class="row g-3 mb-4">

<div class="col-md-4">
<label>Transaction Amount</label>
<input type="number" step="0.01" min="0" name="transaction_amount" class="form-control" required>
</div>

<div class="col-md-4">
<label>Transaction Type</label>
<select name="transaction_type" class="form-select" required>
<option value="">Select Type</option>
<option>CASH_IN</option>
<option>CASH_OUT</option>
<option>DEBIT</option>
<option>PAYMENT</option>
<option>TRANSFER</option>
</select>
</div>

<div class="col-md-4">
<label>Transaction Hour (0-23)</label>
<input type="number" min="0" max="23" name="transaction_hour" class="form-control" required>
</div>

</div>

<div class="row g-3 mb-4">

<div class="col-md-6">
<label>Sender Account</label>
<input type="text" name="sender_account" class="form-control" maxlength="10" pattern="\d{1,10}" required>
</div>

<div class="col-md-6">
<label>Receiver Account</label>
<input type="text" name="receiver_account" class="form-control" maxlength="10" pattern="\d{1,10}" required>
</div>

<div class="col-md-6">
<label>Sender Balance Before</label>
<input type="number" step="0.01" min="0" name="sender_balance_before" class="form-control" required>
</div>

<div class="col-md-6">
<label>Receiver Balance Before</label>
<input type="number" step="0.01" min="0" name="receiver_balance_before" class="form-control" required>
</div>

</div>

<div class="row g-3 mb-4">

<div class="col-md-6">
<label>Investigator Email</label>
<input type="email" name="investigator_email" class="form-control" placeholder="example@email.com" required>
</div>

</div>

<input type="hidden" name="sender_location" id="sender_location">

<div class="text-center mt-4">
<button type="submit" class="btn btn-primary btn-lg">Run Detection</button>
</div>

</form>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(position) {
                document.getElementById("sender_location").value =
                    position.coords.latitude + "," + position.coords.longitude;
            },
            function() {
                document.getElementById("sender_location").value = "Unknown";
            }
        );
    } else {
        document.getElementById("sender_location").value = "Unknown";
    }
});
</script>

{% endblock %}
